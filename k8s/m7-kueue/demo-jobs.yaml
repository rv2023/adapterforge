---
# Gang job: 2 pods that must be admitted TOGETHER (all-or-nothing). With the quota nearly
# full, this won't admit until enough frees for BOTH pods at once.
apiVersion: batch/v1
kind: Job
metadata:
  name: gang-job
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: cpu-local
spec:
  parallelism: 2 # 2 pods
  completions: 2
  suspend: true
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sleep
          image: busybox
          command: ["sh", "-c", "sleep 120"]
          resources:
            requests:
              cpu: "400m" # same per-pod request; 2x of this must fit the quota at once
              memory: "128Mi"
