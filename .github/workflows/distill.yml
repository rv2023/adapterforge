# M5 Piece 5, Step 6 — distillation CI/CD (the JD "distillation pipeline" bullet).
#
# Scaffold. Wires the distill pipeline as a workflow. HONEST CAVEAT: GitHub-hosted
# runners are CPU-only, and Steps 2–3 (teacher 4-bit forward + student train) need a GPU.
# So the GPU steps require a SELF-HOSTED GPU runner (or this workflow triggers a pod).
# Steps that are CPU-fine (collect, eval, register) can run on hosted runners.
#
# Secrets needed (repo settings): ALPHAVANTAGE_API_KEY, MLFLOW_TRACKING_URI.

name: distill

on:
  workflow_dispatch: {}          # manual trigger
  repository_dispatch:           # webhook trigger (mirrors retrain.yml pattern)
    types: [distill]

jobs:
  distill:
    runs-on: [self-hosted, gpu]
    env:
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e adapter-sdk
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA-enabled torch is required on the self-hosted GPU runner'; print(f'torch={torch.__version__} cuda={torch.version.cuda} gpus={torch.cuda.device_count()}')"
          pip install -r requirements-gpu.txt
      - name: Collect headlines
        run: python -m pipelines.collect_headlines
      - name: Distill labels
        run: python -m pipelines.distill_label
      - name: Train student
        run: python -m pipelines.distill_train
      - name: Evaluate student
        run: python -m pipelines.eval_student
      - name: Register student
        run: python -m pipelines.register_student
