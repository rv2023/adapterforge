# Marquez (OpenLineage backend) for local lineage — M4.4b.
# Run:   docker compose -f docker-compose.marquez.yml up -d
# UI:    http://localhost:3001     API: http://localhost:5000
# Ports chosen to avoid clashes: web 3001 (Dagster owns 3000), api 5000, db 6543.
services:
  marquez-db:
    image: postgres:14
    container_name: marquez-db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    ports:
      - "6543:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 5s
      timeout: 5s
      retries: 10

  marquez-api:
    image: marquezproject/marquez:0.50.0
    container_name: marquez-api
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    depends_on:
      marquez-db:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    container_name: marquez-web
    ports:
      - "3001:3000"
    environment:
      # marquez-web runs a SERVER-SIDE proxy (/api/v1 -> the API), so the host is
      # the docker-internal name, not localhost. And WEB_PORT must be set or the
      # web server listens on "undefined" and never serves.
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
    depends_on:
      - marquez-api
